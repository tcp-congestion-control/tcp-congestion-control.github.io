<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
        <title>Color</title>
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
       <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {

                document.querySelectorAll('button').forEach(function(button) {
                    
                    button.onclick = function() {
                        obj = document.querySelector('#hello');
                        token = obj.classList[1];
                        let a = '';
                        switch(button.dataset.color) {
                            case 'red':
                                a = 'text-danger';
                                break;
                            case 'blue':
                                a = 'text-primary';
                                break;
                            case 'green':
                                a = 'text-success';
                        };
                        obj.classList.replace(token, a);
                    };
                });
            });
        </script>
    </head>
    <body>
        <div class='m-5'>
            <h1 id='hello' class='display-1 text-primary'>Hello</h1>
            <button data-color='red' class='btn btn-danger'>Red</button>
            <button data-color='blue' class='btn btn-primary'>Blue</button>
            <button data-color='green' class='btn btn-success'>Green</button>
        </div>
        
    </body>
</html>
